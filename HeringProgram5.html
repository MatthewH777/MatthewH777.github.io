<!DOCTYPE html>
<html>
<head>
    <title>Majors Filtered</title> <!--Name of page-->
    <link rel="stylesheet"
href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js">
    </script>
    <script src="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js">
    </script>

    <style> .btn{margin: 5px} </style>


    
<!--Handlebars template-->
<script id="menuTemplate" type="text/x-handlebars-template">

    <table class="table table-striped">
        <tr><th>name</th><th>major</th><th>midterm</th><th>final</th></tr>
        {{#each rows}}
            <tr>
                <td>{{name}}</td><td>{{major}}</td><td>{{midterm}}</td><td>{{final}}</td>
            </tr>
        {{/each}}
    </table>

</script>


</head>
<body>
    <div class="container">
        <h3>Select a Major</h3>
        <br>
        <h4>Dataset is filtered by major</h4>

        <form>
            <p><button type="button" class="btn btn-primary" onClick="getData('CIT')">CIT Majors</button> <!--click here button-->   
            <p><button type="button" class="btn btn-primary" onClick="getData('BUS')">Business Majors</button> <!--click here button-->   
        </form><br>
        
        <table id="dataTable" class="table table-striped" style="display:none"> <!--Make table for data-->
            
        </table>
    </div>

    <script src="app.js"></script>  <!--Application ajax code-->
</body>
</html>
